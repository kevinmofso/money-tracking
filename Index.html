<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Money Pro</title>
<!-- Cargamos Chart.js para los gráficos -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e10; --surface: #1a1a1e; --surface2: #242428; --border: #2e2e34;
    --text: #f0f0f2; --muted: #6b6b78; --orange: #ff6b2b; --orange-dim: rgba(255,107,43,0.15);
    --green: #30d980; --red: #ff4d6a; --blue: #4d9fff; --purple: #a87fff; --yellow: #ffd166;
  }

  html, body { height: 100%; width: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); overflow: hidden; position: fixed; }
  .app { display: flex; flex-direction: column; height: 100dvh; width: 100%; max-width: 100vw; }
  .status-bar { height: env(safe-area-inset-top, 20px); background: var(--bg); flex-shrink: 0; }
  .screen { flex: 1; overflow: hidden; position: relative; width: 100%; }
  .tab-content { display: none; height: 100%; flex-direction: column; width: 100%; }
  .tab-content.active { display: flex; animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .scroll-area { flex: 1; overflow-y: auto; padding: 0 16px 20px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* ANALYTICS STYLES */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 20px; font-size: 12px; white-space: nowrap; cursor: pointer; }
  .filter-chip.active { background: var(--orange); color: white; border-color: var(--orange); }
  
  .select-input { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 8px; border-radius: 10px; font-size: 13px; width: 100%; margin-bottom: 16px; outline: none; }

  .chart-container { background: var(--surface); border-radius: 20px; padding: 16px; border: 1px solid var(--border); margin-bottom: 20px; height: 260px; }

  /* ELEMENTOS REPETIDOS (TXN, HEADER, etc) */
  .home-header { padding: 16px 0 12px; }
  .home-header h1 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .balance-amount { font-size: 36px; font-weight: 300; }
  .txn-item { background: var(--surface); border-radius: 14px; padding: 12px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--border); margin-bottom: 8px; }
  .txn-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .txn-info { flex: 1; min-width: 0; }
  .txn-name { font-size: 14px; font-weight: 500; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
  .txn-amount { font-size: 14px; font-weight: 600; font-family: 'DM Mono'; }
  .txn-amount.neg { color: var(--red); }
  .btn-delete { background: var(--surface2); color: var(--muted); border: none; width: 28px; height: 28px; border-radius: 8px; cursor: pointer; }

  /* ADD SCREEN */
  .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
  .cat-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 4px; display: flex; flex-direction: column; align-items: center; font-size: 18px; }
  .cat-btn.selected { border-color: var(--orange); background: var(--orange-dim); }
  .add-btn { background: var(--orange); border: none; border-radius: 16px; padding: 16px; color: #fff; font-size: 16px; font-weight: 600; width: 100%; margin-top: 20px; }

  /* TAB BAR */
  .tab-bar { background: var(--surface); border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom, 16px); height: calc(65px + env(safe-area-inset-bottom)); }
  .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: var(--muted); cursor: pointer; }
  .tab-item.active { color: var(--orange); }
  .fab-wrap { flex: 1; position: relative; display: flex; justify-content: center; }
  .fab { width: 50px; height: 50px; border-radius: 25px; background: var(--orange); border: none; color: white; font-size: 24px; position: absolute; top: -20px; box-shadow: 0 4px 15px rgba(255,107,43,0.4); }
</style>
</head>
<body>

<div class="app">
  <div class="status-bar"></div>
  <div class="screen">

    <!-- HOME -->
    <div class="tab-content active" id="tab-home">
      <div class="scroll-area">
        <div class="home-header">
          <h1 id="month-label">May 2026</h1>
          <div class="balance-amount">$<span id="total-spent">0.00</span></div>
        </div>
        <div id="recent-list"></div>
      </div>
    </div>

    <!-- ANALYTICS -->
    <div class="tab-content" id="tab-stats">
      <div class="scroll-area">
        <div class="home-header"><h1>Analytics</h1></div>
        
        <div class="filter-bar">
          <div class="filter-chip active" onclick="setPeriod('day', this)">Day</div>
          <div class="filter-chip" onclick="setPeriod('week', this)">Week</div>
          <div class="filter-chip" onclick="setPeriod('month', this)">Month</div>
          <div class="filter-chip" onclick="setPeriod('year', this)">Year</div>
        </div>

        <select class="select-input" id="cat-filter" onchange="updateChart()">
          <option value="all">All Categories</option>
        </select>

        <div class="chart-container">
          <canvas id="mainChart"></canvas>
        </div>

        <div id="stats-summary" style="font-size: 13px; color: var(--muted); line-height: 1.6;"></div>
      </div>
    </div>

    <!-- ADD -->
    <div class="tab-content" id="tab-add">
      <div class="scroll-area" style="padding-top:20px">
        <input class="balance-amount" id="amount-input" type="number" placeholder="0.00" style="background:none; border:none; color:white; width:100%; text-align:center; outline:none;" inputmode="decimal">
        <input type="text" id="desc-input" placeholder="What for?" style="background:var(--surface); border:1px solid var(--border); width:100%; padding:14px; border-radius:12px; color:white; margin:20px 0; outline:none;">
        <div class="cat-grid" id="cat-grid"></div>
        <button class="add-btn" onclick="addEntry()">Add Expense</button>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="tab-content" id="tab-history">
      <div class="scroll-area">
        <div class="home-header"><h1>History</h1></div>
        <div id="history-list"></div>
      </div>
    </div>

  </div>

  <!-- NAVBAR -->
  <div class="tab-bar">
    <div class="tab-item active" id="nav-home" onclick="switchTab('home')"><span>◎</span><small>Home</small></div>
    <div class="tab-item" id="nav-stats" onclick="switchTab('stats')"><span>📊</span><small>Stats</small></div>
    <div class="fab-wrap"><button class="fab" onclick="switchTab('add')">+</button></div>
    <div class="tab-item" id="nav-history" onclick="switchTab('history')"><span>≡</span><small>List</small></div>
  </div>
</div>

<script>
const CATS = [
  {id:'food', emoji:'🍔', label:'Food', color:'#ff6b2b'},
  {id:'transit', emoji:'🚇', label:'Transit', color:'#4d9fff'},
  {id:'shop', emoji:'🛍️', label:'Shop', color:'#a87fff'},
  {id:'bills', emoji:'💡', label:'Bills', color:'#ffd166'},
  {id:'fun', emoji:'🎮', label:'Fun', color:'#ff4d6a'},
  {id:'other', emoji:'📦', label:'Other', color:'#6b6b78'},
];

let entries = JSON.parse(localStorage.getItem('money_v4') || '[]');
let selectedCat = 'food';
let currentPeriod = 'day';
let myChart = null;

// Init categories and filters
const grid = document.getElementById('cat-grid');
const catFilter = document.getElementById('cat-filter');
CATS.forEach(c => {
  const btn = document.createElement('div');
  btn.className = 'cat-btn' + (c.id === selectedCat ? ' selected' : '');
  btn.innerHTML = `${c.emoji}<span style="font-size:10px">${c.label}</span>`;
  btn.onclick = () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedCat = c.id;
  };
  grid.appendChild(btn);

  const opt = document.createElement('option');
  opt.value = c.id; opt.textContent = c.label;
  catFilter.appendChild(opt);
});

function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  const nav = document.getElementById('nav-' + name);
  if(nav) nav.classList.add('active');
  
  if(name === 'home') renderHome();
  if(name === 'stats') updateChart();
  if(name === 'history') renderHistory();
}

function addEntry() {
  const amt = parseFloat(document.getElementById('amount-input').value);
  if (!amt) return;
  const cat = CATS.find(c => c.id === selectedCat);
  entries.unshift({ id: Date.now(), amount: amt, desc: document.getElementById('desc-input').value || 'Expense', ...cat, date: new Date().toISOString() });
  localStorage.setItem('money_v4', JSON.stringify(entries));
  document.getElementById('amount-input').value = '';
  switchTab('home');
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  localStorage.setItem('money_v4', JSON.stringify(entries));
  renderHome(); renderHistory(); if(myChart) updateChart();
}

function renderHome() {
  const total = entries.reduce((s, e) => s + e.amount, 0);
  document.getElementById('total-spent').textContent = total.toFixed(2);
  document.getElementById('recent-list').innerHTML = entries.slice(0, 5).map(e => `
    <div class="txn-item">
      <div class="txn-icon" style="background:${e.color}22">${e.emoji}</div>
      <div class="txn-info"><div class="txn-name">${e.desc}</div></div>
      <div class="txn-amount neg">-$${e.amount.toFixed(2)}</div>
      <button class="btn-delete" onclick="deleteEntry(${e.id})">✕</button>
    </div>`).join('');
}

function renderHistory() {
  document.getElementById('history-list').innerHTML = entries.map(e => `
    <div class="txn-item">
      <div class="txn-icon" style="background:${e.color}22">${e.emoji}</div>
      <div class="txn-info">
        <div class="txn-name">${e.desc}</div>
        <div style="font-size:10px; color:var(--muted)">${new Date(e.date).toLocaleDateString()}</div>
      </div>
      <div class="txn-amount neg">-$${e.amount.toFixed(2)}</div>
      <button class="btn-delete" onclick="deleteEntry(${e.id})">✕</button>
    </div>`).join('');
}

// ANALYTICS LOGIC
function setPeriod(p, el) {
  currentPeriod = p;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  updateChart();
}

function updateChart() {
  const ctx = document.getElementById('mainChart').getContext('2d');
  const cat = document.getElementById('cat-filter').value;
  
  // Filtrar datos
  let filtered = entries;
  if(cat !== 'all') filtered = filtered.filter(e => e.id_cat === cat || e.cat === cat);

  const now = new Date();
  let labels = [];
  let dataPoints = [];

  if(currentPeriod === 'day') {
    labels = ['Today'];
    const todayStr = now.toDateString();
    const sum = filtered.filter(e => new Date(e.date).toDateString() === todayStr).reduce((s,e)=>s+e.amount, 0);
    dataPoints = [sum];
  } else if(currentPeriod === 'week') {
    labels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    dataPoints = new Array(7).fill(0);
    filtered.forEach(e => {
      const d = new Date(e.date);
      const day = (d.getDay() + 6) % 7; // Ajustar a Lunes inicio
      dataPoints[day] += e.amount;
    });
  } else if(currentPeriod === 'month') {
    labels = ['W1', 'W2', 'W3', 'W4'];
    dataPoints = new Array(4).fill(0);
    filtered.forEach(e => {
      const d = new Date(e.date);
      if(d.getMonth() === now.getMonth()) {
        const week = Math.floor((d.getDate() - 1) / 7);
        if(week < 4) dataPoints[week] += e.amount;
      }
    });
  } else {
    labels = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    dataPoints = new Array(12).fill(0);
    filtered.forEach(e => {
      const d = new Date(e.date);
      if(d.getFullYear() === now.getFullYear()) dataPoints[d.getMonth()] += e.amount;
    });
  }

  if(myChart) myChart.destroy();
  myChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Spending',
        data: dataPoints,
        backgroundColor: '#ff6b2b',
        borderRadius: 8,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { grid: { color: '#2e2e34' }, ticks: { color: '#6b6b78' } },
        x: { grid: { display: false }, ticks: { color: '#6b6b78' } }
      }
    }
  });

  const total = dataPoints.reduce((a,b)=>a+b,0);
  document.getElementById('stats-summary').innerHTML = `Total in this period: <b>$${total.toFixed(2)}</b><br>Average per point: $${(total/labels.length).toFixed(2)}`;
}

renderHome();
</script>
</body>
</html>
