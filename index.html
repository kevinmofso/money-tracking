<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Money">
<title>Money Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e10; --surface: #1a1a1e; --surface2: #242428; --border: #2e2e34;
    --text: #f0f0f2; --muted: #6b6b78; --orange: #ff6b2b; --orange-dim: rgba(255,107,43,0.15);
    --green: #30d980; --red: #ff4d6a; --blue: #4d9fff; --purple: #a87fff; --yellow: #ffd166; --teal: #2dd4bf;
  }
  html { height: 100%; background: var(--bg); }
  body { height: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); }
  .app {
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    min-height: -webkit-fill-available;
    position: fixed; inset: 0;
  }
  .status-bar { height: env(safe-area-inset-top, 0px); background: var(--bg); flex-shrink: 0; }
  .screen { flex: 1; overflow: hidden; position: relative; min-height: 0; }
  .tab-content { display: none; height: 100%; flex-direction: column; }
  .tab-content.active { display: flex; animation: fadeUp 0.25s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  /* ── HOME ── */
  .home-scroll { flex: 1; overflow-y: auto; padding: 0 20px 20px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .home-scroll::-webkit-scrollbar { display: none; }
  .home-header { padding: 20px 0 16px; }
  .home-header h1 { font-size: 13px; font-weight: 500; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .balance-amount { font-size: 42px; font-weight: 300; color: var(--text); letter-spacing: -1px; margin-top: 4px; }
  .balance-amount span { font-size: 22px; color: var(--muted); }
  .balance-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* ── CHART ── */
  .chart-card { background: var(--surface); border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); }
  .chart-title { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
  .cat-filter-wrap { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; margin-bottom: 14px; }
  .cat-filter-wrap::-webkit-scrollbar { display: none; }
  .cat-pill { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 500; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.18s; flex-shrink: 0; }
  .cat-pill.active { background: var(--orange-dim); border-color: var(--orange); color: var(--orange); }
  .chart-body { display: flex; align-items: center; gap: 20px; }
  .donut-wrap { position: relative; width: 110px; height: 110px; flex-shrink: 0; }
  .donut-wrap svg { width: 110px; height: 110px; transform: rotate(-90deg); }
  .donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; }
  .donut-center-val { font-size: 16px; font-weight: 600; color: var(--text); }
  .donut-center-label { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .legend { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; border-radius: 8px; padding: 2px 4px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .legend-name { font-size: 12px; color: var(--muted); flex: 1; }
  .legend-pct { font-size: 12px; font-weight: 500; color: var(--text); }

  /* ── TXN ITEMS ── */
  .section-label { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .txn-list { display: flex; flex-direction: column; gap: 8px; }
  .txn-item { background: var(--surface); border-radius: 14px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; border: 1px solid var(--border); transition: opacity 0.2s; }
  .txn-item.dimmed { opacity: 0.3; }
  .txn-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .txn-info { flex: 1; min-width: 0; }
  .txn-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .txn-meta { font-size: 11px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .txn-note { font-size: 11px; color: var(--blue); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-style: italic; }
  .txn-amount { font-size: 14px; font-weight: 600; font-family: 'DM Mono', monospace; white-space: nowrap; }
  .txn-amount.neg { color: var(--red); }
  .txn-amount.pos { color: var(--green); }
  .txn-actions { display: flex; gap: 2px; flex-shrink: 0; }
  .txn-edit   { background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; padding: 6px 5px; border-radius: 8px; transition: all 0.15s; line-height: 1; }
  .txn-delete { background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; padding: 6px 5px; border-radius: 8px; transition: all 0.15s; line-height: 1; }
  .txn-edit:active   { color: var(--blue); background: rgba(77,159,255,0.12); }
  .txn-delete:active { color: var(--red);  background: rgba(255,77,106,0.12); }

  /* ── ADD / EDIT ── */
  .add-screen { padding: 20px; display: flex; flex-direction: column; gap: 16px; height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .add-screen::-webkit-scrollbar { display: none; }
  .add-title { font-size: 22px; font-weight: 600; color: var(--text); }
  .type-toggle { display: flex; background: var(--surface); border-radius: 12px; padding: 4px; gap: 4px; }
  .type-btn { flex: 1; padding: 8px; border: none; border-radius: 9px; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; background: transparent; color: var(--muted); }
  .type-btn.active-expense { background: var(--orange); color: #fff; }
  .type-btn.active-income  { background: var(--green);  color: #111; }
  .amount-input-wrap { text-align: center; padding: 10px 0; }
  .currency-sym { font-size: 28px; color: var(--muted); vertical-align: top; margin-top: 8px; }
  .amount-input { background: transparent; border: none; outline: none; font-size: 52px; font-weight: 300; color: var(--text); width: 180px; text-align: center; font-family: 'DM Sans', sans-serif; letter-spacing: -2px; }
  .field-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .field-label small { font-size: 10px; text-transform: none; letter-spacing: 0; }
  .field-input { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; width: 100%; outline: none; -webkit-appearance: none; }
  .field-input:focus { border-color: var(--orange); }
  textarea.field-input { resize: none; line-height: 1.4; }
  .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .cat-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 6px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: all 0.2s; font-size: 18px; }
  .cat-btn span { font-size: 10px; color: var(--muted); font-family: 'DM Sans', sans-serif; }
  .cat-btn.selected { border-color: var(--orange); background: var(--orange-dim); }
  .cat-btn.selected span { color: var(--orange); }
  .add-btn { background: var(--orange); border: none; border-radius: 16px; padding: 16px; color: #fff; font-size: 16px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; width: 100%; margin-top: auto; box-shadow: 0 8px 24px rgba(255,107,43,0.4); transition: transform 0.1s; }
  .add-btn:active { transform: scale(0.97); }
  .add-btn.editing { background: var(--blue); box-shadow: 0 8px 24px rgba(77,159,255,0.35); }

  /* ── HISTORY ── */
  .history-screen { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
  .history-header { padding: 20px 20px 0; flex-shrink: 0; }
  .history-top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .history-title { font-size: 22px; font-weight: 600; color: var(--text); }
  .export-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 7px 12px; color: var(--muted); font-size: 12px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.15s; white-space: nowrap; }
  .export-btn:active { color: var(--green); border-color: var(--green); }

  /* Search */
  .search-wrap { position: relative; margin-bottom: 12px; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--muted); pointer-events: none; }
  .search-input { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 36px 10px 36px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; width: 100%; outline: none; -webkit-appearance: none; }
  .search-input:focus { border-color: var(--orange); }
  .search-clear { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 4px; display: none; }
  .search-clear.visible { display: block; }

  /* Period filter */
  .period-filter { display: flex; background: var(--surface); border-radius: 12px; padding: 4px; gap: 3px; margin-bottom: 12px; }
  .period-btn { flex: 1; padding: 7px 4px; border: none; border-radius: 9px; font-size: 12px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; background: transparent; color: var(--muted); }
  .period-btn.active { background: var(--orange); color: #fff; }

  .hist-cat-filter { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 10px; }
  .hist-cat-filter::-webkit-scrollbar { display: none; }

  .hist-summary { display: flex; gap: 10px; margin-bottom: 14px; }
  .hist-stat { flex: 1; background: var(--surface); border-radius: 12px; padding: 10px 12px; border: 1px solid var(--border); }
  .hist-stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .hist-stat-val { font-size: 15px; font-weight: 600; margin-top: 2px; font-family: 'DM Mono', monospace; }
  .hist-stat-val.neg { color: var(--red); }
  .hist-stat-val.pos { color: var(--green); }
  .hist-stat-val.net-pos { color: var(--green); }
  .hist-stat-val.net-neg { color: var(--red); }

  .history-scroll { flex: 1; overflow-y: auto; padding: 0 20px 20px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .history-scroll::-webkit-scrollbar { display: none; }
  .month-group { margin-bottom: 20px; }
  .month-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }

  /* ── TAB BAR ── */
  .tab-bar {
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; align-items: flex-start; padding-top: 10px; flex-shrink: 0;
    padding-bottom: max(env(safe-area-inset-bottom, 0px), 16px);
  }
  .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 0 4px; }
  .tab-icon { font-size: 20px; line-height: 1; }
  .tab-label { font-size: 10px; color: var(--muted); font-weight: 500; }
  .tab-item.active .tab-label { color: var(--orange); }
  .fab-wrap { flex: 1; display: flex; justify-content: center; }
  .fab { width: 52px; height: 52px; border-radius: 50%; background: var(--orange); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #fff; box-shadow: 0 6px 20px rgba(255,107,43,0.5); transition: transform 0.15s; margin-top: -20px; }
  .fab:active { transform: scale(0.93); }

  /* Toast */
  .toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--green); color: #111; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 100; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Sheet */
  .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; align-items: flex-end; padding-bottom: env(safe-area-inset-bottom, 0px); opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .sheet-overlay.show { opacity: 1; pointer-events: all; }
  .sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; border-top: 1px solid var(--border); transform: translateY(100%); transition: transform 0.25s cubic-bezier(.32,.72,0,1); }
  .sheet-overlay.show .sheet { transform: translateY(0); }
  .sheet-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .sheet-desc  { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .sheet-btns  { display: flex; gap: 10px; }
  .sheet-cancel     { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 13px; color: var(--text); font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; }
  .sheet-confirm-del{ flex: 1; background: var(--red); border: none; border-radius: 12px; padding: 13px; color: #fff; font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; }

  .empty-state { font-size: 13px; color: var(--muted); padding: 20px 0; text-align: center; }
  .search-results-label { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
</style>
</head>
<body>
<div class="app">
  <div class="status-bar"></div>
  <div class="screen">

    <!-- HOME -->
    <div class="tab-content active" id="tab-home">
      <div class="home-scroll">
        <div class="home-header">
          <h1 id="month-label">May 2026</h1>
          <div class="balance-amount"><span>$</span><span id="total-spent">0.00</span></div>
          <div class="balance-sub">total spent this month</div>
        </div>
        <div class="chart-card">
          <div class="chart-title">By category</div>
          <div class="cat-filter-wrap" id="chart-cat-filter"></div>
          <div class="chart-body">
            <div class="donut-wrap">
              <svg viewBox="0 0 36 36" id="donut-svg">
                <circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--surface2)" stroke-width="3.5"/>
              </svg>
              <div class="donut-center">
                <div class="donut-center-val" id="donut-pct">—</div>
                <div class="donut-center-label" id="donut-top">top</div>
              </div>
            </div>
            <div class="legend" id="donut-legend"><div class="empty-state" style="padding:0">No data yet</div></div>
          </div>
        </div>
        <div class="section-label">Recent</div>
        <div class="txn-list" id="txn-list">
          <div class="empty-state">No transactions yet. Tap + to add one.</div>
        </div>
      </div>
    </div>

    <!-- ADD / EDIT -->
    <div class="tab-content" id="tab-add">
      <div class="add-screen">
        <div class="add-title" id="add-title">New entry</div>
        <div class="type-toggle">
          <button class="type-btn active-expense" id="btn-expense" onclick="setType('expense')">Expense</button>
          <button class="type-btn" id="btn-income" onclick="setType('income')">Income</button>
        </div>
        <div class="amount-input-wrap">
          <span class="currency-sym">$</span>
          <input class="amount-input" id="amount-input" type="number" placeholder="0" min="0" step="0.01" inputmode="decimal">
        </div>
        <div>
          <div class="field-label">Description</div>
          <input class="field-input" id="desc-input" type="text" placeholder="What was it for?">
        </div>
        <div>
          <div class="field-label">Note &nbsp;<small style="color:var(--muted)">(optional)</small></div>
          <textarea class="field-input" id="note-input" rows="2" placeholder="e.g. dinner with Juan, work expense…"></textarea>
        </div>
        <div>
          <div class="field-label">Category</div>
          <div class="cat-grid" id="cat-grid"></div>
        </div>
        <button class="add-btn" id="add-btn" onclick="submitEntry()">Add Entry</button>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="tab-content" id="tab-history">
      <div class="history-screen">
        <div class="history-header">
          <div class="history-top-row">
            <div class="history-title">History</div>
            <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
          </div>

          <!-- Search -->
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input class="search-input" id="search-input" type="text" placeholder="Search transactions…" oninput="onSearch()">
            <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
          </div>

          <!-- Period + filters (hidden while searching) -->
          <div id="period-section">
            <div class="period-filter">
              <button class="period-btn" data-period="day"   onclick="setPeriod('day')">Day</button>
              <button class="period-btn" data-period="week"  onclick="setPeriod('week')">Week</button>
              <button class="period-btn active" data-period="month" onclick="setPeriod('month')">Month</button>
              <button class="period-btn" data-period="year"  onclick="setPeriod('year')">Year</button>
              <button class="period-btn" data-period="all"   onclick="setPeriod('all')">All</button>
            </div>
            <div class="hist-cat-filter" id="hist-cat-filter"></div>
            <div class="hist-summary">
              <div class="hist-stat">
                <div class="hist-stat-label">Expenses</div>
                <div class="hist-stat-val neg" id="hist-expenses">$0</div>
              </div>
              <div class="hist-stat">
                <div class="hist-stat-label">Income</div>
                <div class="hist-stat-val pos" id="hist-income">$0</div>
              </div>
              <div class="hist-stat">
                <div class="hist-stat-label">Net</div>
                <div class="hist-stat-val" id="hist-net">$0</div>
              </div>
            </div>
          </div>
        </div>

        <div class="history-scroll">
          <div id="history-list"><div class="empty-state">No transactions yet.</div></div>
        </div>
      </div>
    </div>

  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab-item active" id="nav-home" onclick="switchTab('home')">
      <span class="tab-icon">◎</span>
      <span class="tab-label">Overview</span>
    </div>
    <div class="fab-wrap">
      <button class="fab" onclick="openAdd()">+</button>
    </div>
    <div class="tab-item" id="nav-history" onclick="switchTab('history')">
      <span class="tab-icon">≡</span>
      <span class="tab-label">History</span>
    </div>
  </div>
</div>

<div class="toast" id="toast">Entry added ✓</div>

<!-- Delete confirm sheet -->
<div class="sheet-overlay" id="confirm-overlay" onclick="closeConfirm(event)">
  <div class="sheet">
    <div class="sheet-title">Delete entry?</div>
    <div class="sheet-desc" id="confirm-desc">This can't be undone.</div>
    <div class="sheet-btns">
      <button class="sheet-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="sheet-confirm-del" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script>
const CATS = [
  {id:'food',      emoji:'🍔', label:'Food',    color:'#ff6b2b'},
  {id:'transport', emoji:'🚇', label:'Transit', color:'#4d9fff'},
  {id:'shopping',  emoji:'🛍️', label:'Shop',   color:'#a87fff'},
  {id:'health',    emoji:'💊', label:'Health', color:'#2dd4bf'},
  {id:'bills',     emoji:'💡', label:'Bills',  color:'#ffd166'},
  {id:'fun',       emoji:'🎮', label:'Fun',    color:'#ff4d6a'},
  {id:'travel',    emoji:'✈️', label:'Travel', color:'#30d980'},
  {id:'other',     emoji:'📦', label:'Other',  color:'#6b6b78'},
];

let entries         = JSON.parse(localStorage.getItem('money_entries_v2') || '[]');
let currentType     = 'expense';
let selectedCat     = 'food';
let activePeriod    = 'month';
let activeChartCat  = null;
let activeHistCat   = null;
let pendingDeleteId = null;
let editingId       = null;
let searchQuery     = '';

// ── Build cat grid ──
const grid = document.getElementById('cat-grid');
CATS.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (c.id===selectedCat?' selected':'');
  btn.dataset.id = c.id;
  btn.innerHTML = `${c.emoji}<span>${c.label}</span>`;
  btn.onclick = () => { selectCat(c.id); };
  grid.appendChild(btn);
});

const now = new Date();
document.getElementById('month-label').textContent =
  now.toLocaleString('default', {month:'long', year:'numeric'});

// ── Utils ──
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function save() { localStorage.setItem('money_entries_v2', JSON.stringify(entries)); }

function startOf(period) {
  const d = new Date();
  if (period==='day')  { d.setHours(0,0,0,0); return d; }
  if (period==='week') { d.setDate(d.getDate()-d.getDay()); d.setHours(0,0,0,0); return d; }
  if (period==='month'){ d.setDate(1); d.setHours(0,0,0,0); return d; }
  if (period==='year') { d.setMonth(0,1); d.setHours(0,0,0,0); return d; }
  return null;
}
function filterByPeriod(list, period) {
  const from = startOf(period);
  return from ? list.filter(e=>new Date(e.date)>=from) : list;
}
function groupLabel(e, period) {
  const d = new Date(e.date);
  if (period==='day'||period==='week') return d.toLocaleString('default',{weekday:'long',day:'numeric',month:'short'});
  if (period==='month') return d.toLocaleString('default',{day:'numeric',month:'long'});
  return d.toLocaleString('default',{month:'long',year:'numeric'});
}

// ── Transaction HTML ──
function txnHtml(e, dimmed) {
  const noteHtml = e.note ? `<div class="txn-note">💬 ${escHtml(e.note)}</div>` : '';
  return `<div class="txn-item${dimmed?' dimmed':''}">
    <div class="txn-icon" style="background:${e.color}22">${e.emoji}</div>
    <div class="txn-info">
      <div class="txn-name">${escHtml(e.desc)}</div>
      <div class="txn-meta">${e.label} · ${new Date(e.date).toLocaleDateString()}</div>
      ${noteHtml}
    </div>
    <div class="txn-amount ${e.type==='expense'?'neg':'pos'}">${e.type==='expense'?'-':'+'}$${e.amount.toFixed(2)}</div>
    <div class="txn-actions">
      <button class="txn-edit"   onclick="openEdit(${e.id})">✏️</button>
      <button class="txn-delete" onclick="askDelete(${e.id})">✕</button>
    </div>
  </div>`;
}

// ── Type toggle ──
function setType(t) {
  currentType = t;
  document.getElementById('btn-expense').className = 'type-btn'+(t==='expense'?' active-expense':'');
  document.getElementById('btn-income').className  = 'type-btn'+(t==='income'?' active-income':'');
}

function selectCat(catId) {
  selectedCat = catId;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('selected', b.dataset.id===catId));
}

// ── Tab switch ──
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if (name!=='add') document.getElementById('nav-'+name)?.classList.add('active');
  if (name==='home') renderHome();
  if (name==='history') renderHistory();
}

// ── Open Add (new) ──
function openAdd() {
  editingId = null;
  document.getElementById('add-title').textContent = 'New entry';
  document.getElementById('add-btn').textContent   = 'Add Entry';
  document.getElementById('add-btn').className     = 'add-btn';
  document.getElementById('amount-input').value    = '';
  document.getElementById('desc-input').value      = '';
  document.getElementById('note-input').value      = '';
  setType('expense');
  selectCat('food');
  switchTab('add');
}

// ── Open Edit ──
function openEdit(id) {
  const e = entries.find(x=>x.id===id);
  if (!e) return;
  editingId = id;
  document.getElementById('add-title').textContent = 'Edit entry';
  document.getElementById('add-btn').textContent   = 'Save Changes';
  document.getElementById('add-btn').className     = 'add-btn editing';
  document.getElementById('amount-input').value    = e.amount;
  document.getElementById('desc-input').value      = e.desc;
  document.getElementById('note-input').value      = e.note || '';
  setType(e.type);
  selectCat(e.cat);
  switchTab('add');
}

// ── Submit (add or save edit) ──
function submitEntry() {
  const amt  = parseFloat(document.getElementById('amount-input').value);
  const desc = document.getElementById('desc-input').value.trim() || 'Untitled';
  const note = document.getElementById('note-input').value.trim();
  if (!amt || amt<=0) { alert('Please enter a valid amount'); return; }
  const cat = CATS.find(c=>c.id===selectedCat);

  if (editingId !== null) {
    const idx = entries.findIndex(x=>x.id===editingId);
    if (idx !== -1) {
      entries[idx] = { ...entries[idx], type:currentType, amount:amt, desc, note,
        cat:cat.id, emoji:cat.emoji, color:cat.color, label:cat.label };
    }
    save();
    showToast('Changes saved ✓', 'var(--blue)', '#fff');
  } else {
    entries.unshift({ id:Date.now(), type:currentType, amount:amt, desc, note,
      cat:cat.id, emoji:cat.emoji, color:cat.color, label:cat.label,
      date:new Date().toISOString() });
    save();
    showToast('Entry added ✓', 'var(--green)', '#111');
  }
  editingId = null;
  switchTab('home');
}

// ── Delete ──
function askDelete(id) {
  const e = entries.find(x=>x.id===id);
  if (!e) return;
  pendingDeleteId = id;
  document.getElementById('confirm-desc').textContent = `"${e.desc}" — $${e.amount.toFixed(2)}`;
  document.getElementById('confirm-overlay').classList.add('show');
}
function closeConfirm(e) {
  if (e && e.target!==document.getElementById('confirm-overlay')) return;
  document.getElementById('confirm-overlay').classList.remove('show');
  pendingDeleteId = null;
}
function confirmDelete() {
  if (!pendingDeleteId) return;
  entries = entries.filter(x=>x.id!==pendingDeleteId);
  save(); pendingDeleteId = null;
  document.getElementById('confirm-overlay').classList.remove('show');
  renderHome(); renderHistory();
}

// ── Toast ──
function showToast(msg, bg='var(--green)', color='#111') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = bg; t.style.color = color;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// ── Search ──
function onSearch() {
  searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
  const hasQuery = searchQuery.length > 0;
  document.getElementById('search-clear').classList.toggle('visible', hasQuery);
  document.getElementById('period-section').style.display = hasQuery ? 'none' : '';
  renderHistory();
}
function clearSearch() {
  document.getElementById('search-input').value = '';
  searchQuery = '';
  document.getElementById('search-clear').classList.remove('visible');
  document.getElementById('period-section').style.display = '';
  renderHistory();
}

// ── Export CSV ──
function exportCSV() {
  const rows = [['Date','Type','Category','Description','Note','Amount']];
  entries.forEach(e => {
    rows.push([
      new Date(e.date).toLocaleDateString(),
      e.type, e.label,
      `"${(e.desc||'').replace(/"/g,'""')}"`,
      `"${(e.note||'').replace(/"/g,'""')}"`,
      e.type==='expense' ? -e.amount : e.amount
    ]);
  });
  const csv  = rows.map(r=>r.join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `money-tracker-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
  showToast('CSV exported ✓', 'var(--green)', '#111');
}

// ── Chart cat filter ──
function buildChartCatFilter(monthEntries) {
  const wrap = document.getElementById('chart-cat-filter');
  const used = [...new Set(monthEntries.filter(e=>e.type==='expense').map(e=>e.cat))];
  if (used.length<=1) { wrap.innerHTML=''; return; }
  let html = `<div class="cat-pill${activeChartCat===null?' active':''}" onclick="setChartCat(null)">All</div>`;
  used.forEach(catId=>{
    const c=CATS.find(x=>x.id===catId); if(!c) return;
    html+=`<div class="cat-pill${activeChartCat===catId?' active':''}" onclick="setChartCat('${catId}')">${c.emoji} ${c.label}</div>`;
  });
  wrap.innerHTML=html;
}
function setChartCat(catId) { activeChartCat=catId; renderHome(); }

// ── Render Home ──
function renderHome() {
  const n = new Date();
  const monthEntries = entries.filter(e=>{
    const d=new Date(e.date);
    return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear()&&e.type==='expense';
  });
  buildChartCatFilter(monthEntries);
  const chartEntries = activeChartCat ? monthEntries.filter(e=>e.cat===activeChartCat) : monthEntries;
  const total = chartEntries.reduce((s,e)=>s+e.amount,0);
  document.getElementById('total-spent').textContent = monthEntries.reduce((s,e)=>s+e.amount,0).toFixed(2);
  const bycat={};
  chartEntries.forEach(e=>{ bycat[e.cat]=(bycat[e.cat]||0)+e.amount; });
  renderDonut(Object.entries(bycat).sort((a,b)=>b[1]-a[1]), total);

  const recent = entries.slice(0,8);
  const list = document.getElementById('txn-list');
  if (!recent.length) { list.innerHTML='<div class="empty-state">No transactions yet. Tap + to add one.</div>'; return; }
  list.innerHTML = recent.map(e=>{
    const dimmed = activeChartCat && e.cat!==activeChartCat && e.type==='expense';
    return txnHtml(e, dimmed);
  }).join('');
}

// ── Render Donut ──
function renderDonut(sorted, total) {
  const svg=document.getElementById('donut-svg');
  svg.querySelectorAll('.seg').forEach(el=>el.remove());
  const legend=document.getElementById('donut-legend');
  if (!sorted.length||total===0) {
    legend.innerHTML='<div style="font-size:12px;color:var(--muted)">No expenses yet</div>';
    document.getElementById('donut-pct').textContent='—';
    document.getElementById('donut-top').textContent='top';
    return;
  }
  const r=15.9,circ=2*Math.PI*r; let offset=0;
  const colors={}; CATS.forEach(c=>{colors[c.id]=c.color;});
  sorted.forEach(([catId,amt])=>{
    const pct=amt/total,dash=pct*circ,gap=circ-dash;
    const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx','18');circle.setAttribute('cy','18');circle.setAttribute('r',r);
    circle.setAttribute('fill','none');circle.setAttribute('stroke',colors[catId]||'#888');
    circle.setAttribute('stroke-width','3.5');
    circle.setAttribute('stroke-dasharray',`${dash} ${gap}`);
    circle.setAttribute('stroke-dashoffset',-offset*circ);
    circle.setAttribute('stroke-linecap','round');
    circle.classList.add('seg'); svg.appendChild(circle); offset+=pct;
  });
  const topCat=CATS.find(c=>c.id===sorted[0][0]);
  document.getElementById('donut-pct').textContent=Math.round(sorted[0][1]/total*100)+'%';
  document.getElementById('donut-top').textContent=topCat?.label||'';
  legend.innerHTML=sorted.slice(0,5).map(([catId,amt])=>{
    const c=CATS.find(x=>x.id===catId);
    return `<div class="legend-item">
      <div class="legend-dot" style="background:${c?.color||'#888'}"></div>
      <span class="legend-name">${c?.label||catId}</span>
      <span class="legend-pct">${Math.round(amt/total*100)}%</span>
    </div>`;
  }).join('');
}

// ── Period filter ──
function setPeriod(p) {
  activePeriod=p; activeHistCat=null;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.toggle('active',b.dataset.period===p));
  renderHistory();
}

// ── History cat filter ──
function buildHistCatFilter(periodEntries) {
  const wrap=document.getElementById('hist-cat-filter');
  const used=[...new Set(periodEntries.map(e=>e.cat))];
  if (used.length<=1) { wrap.innerHTML=''; return; }
  let html=`<div class="cat-pill${activeHistCat===null?' active':''}" onclick="setHistCat(null)">All</div>`;
  used.forEach(catId=>{
    const c=CATS.find(x=>x.id===catId); if(!c) return;
    html+=`<div class="cat-pill${activeHistCat===catId?' active':''}" onclick="setHistCat('${catId}')">${c.emoji} ${c.label}</div>`;
  });
  wrap.innerHTML=html;
}
function setHistCat(catId) { activeHistCat=catId; renderHistory(); }

// ── Render History ──
function renderHistory() {
  const container=document.getElementById('history-list');

  // Search mode
  if (searchQuery) {
    const results=entries.filter(e=>
      e.desc.toLowerCase().includes(searchQuery)||
      e.label.toLowerCase().includes(searchQuery)||
      (e.note||'').toLowerCase().includes(searchQuery)
    );
    if (!results.length) { container.innerHTML=`<div class="empty-state">No results for "${escHtml(searchQuery)}".</div>`; return; }
    container.innerHTML=`<div class="search-results-label">${results.length} result${results.length!==1?'s':''}</div>`
      +`<div class="txn-list">${results.map(e=>txnHtml(e,false)).join('')}</div>`;
    return;
  }

  const periodEntries=filterByPeriod(entries,activePeriod);
  buildHistCatFilter(periodEntries);
  const filtered=activeHistCat?periodEntries.filter(e=>e.cat===activeHistCat):periodEntries;

  const totalExp=filtered.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  const totalInc=filtered.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const net=totalInc-totalExp;
  document.getElementById('hist-expenses').textContent='$'+totalExp.toFixed(2);
  document.getElementById('hist-income').textContent  ='$'+totalInc.toFixed(2);
  const netEl=document.getElementById('hist-net');
  netEl.textContent=(net>=0?'+ ':'- ')+'$'+Math.abs(net).toFixed(2);
  netEl.className='hist-stat-val '+(net>=0?'net-pos':'net-neg');

  if (!filtered.length) { container.innerHTML='<div class="empty-state">No transactions for this period.</div>'; return; }

  const groups={};
  filtered.forEach(e=>{ const k=groupLabel(e,activePeriod); if(!groups[k])groups[k]=[]; groups[k].push(e); });
  container.innerHTML=Object.entries(groups).map(([label,list])=>`
    <div class="month-group">
      <div class="month-label">${label}</div>
      <div class="txn-list">${list.map(e=>txnHtml(e,false)).join('')}</div>
    </div>`).join('');
}

renderHome();
</script>
